[platformio]
default_envs = ota

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
framework = espidf
upload_port = COM10
build_flags = 
	-D ESP32_WROOM=1
	-Werror=implicit-function-declaration
board_build.partitions = partitions.csv

[env:factory]
extends = env
build_flags = 
	-D BUILD_FACTORY_APP
	-D ESP32_WROOM=1
extra_scripts = post:flash_factory.py

[env:ota]
extends = env
extra_scripts = post:flash_ota.py